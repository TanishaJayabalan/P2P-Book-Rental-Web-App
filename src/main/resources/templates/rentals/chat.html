<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rental Chat | Book Rental</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar(${currentUser})}"></div>
<main class="page-shell">
    <section th:if="${successMessage}" class="banner banner-success" th:text="${successMessage}"></section>
    <section th:if="${errorMessage}" class="banner banner-error" th:text="${errorMessage}"></section>

    <section class="hero">
        <p class="eyebrow">Rental Chat</p>
        <h1 th:text="${rental.book.title}">Book Title</h1>
        <p class="hero-copy">
            <strong>Renter:</strong> <span th:text="${rental.renter.name}"></span><br>
            <strong>Lender:</strong> <span th:text="${rental.lender.name}"></span><br>
            <strong>Status:</strong> <span th:text="${rental.status}"></span>
        </p>
    </section>

    <section class="card chat-shell">
        <div class="chat-thread" th:if="${!#lists.isEmpty(messages)}">
            <article th:each="message : ${messages}"
                     class="chat-bubble"
                     th:classappend="${message.sender.id == currentUser.id} ? ' chat-bubble-self' : ' chat-bubble-other'">
                <p class="eyebrow" th:text="${message.sender.name}">Sender</p>
                <p class="hero-copy" th:text="${message.message}">Message</p>
                <p class="chat-meta" th:text="${#temporals.format(message.sentAt, 'yyyy-MM-dd HH:mm')}">Time</p>
            </article>
        </div>

        <div class="empty-state" th:if="${#lists.isEmpty(messages)}">
            <h2>No Messages Yet</h2>
            <p class="hero-copy">Start the conversation to discuss pickup, return timing, or rental details.</p>
        </div>
    </section>

    <section class="form-card compact-form">
        <p class="eyebrow">Send Message</p>
        <form th:action="@{|/rentals/${rental.id}/chat|}" th:object="${chatMessageForm}" method="post" class="stack-form">
            <label>
                Message
                <input type="text" th:field="*{message}" placeholder="Type your message here">
                <span class="field-error" th:if="${#fields.hasErrors('message')}" th:errors="*{message}"></span>
            </label>
            <button type="submit" class="primary-button">Send</button>
        </form>
    </section>
</main>
</body>
</html>
