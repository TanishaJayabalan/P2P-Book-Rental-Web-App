<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List a Book | Book Rental</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar(${currentUser})}"></div>
<main class="page-shell">
    <section class="form-card">
        <p class="eyebrow">Book Listing</p>
        <h1>List a Book for Rent</h1>
        <p class="hero-copy">Add the details readers need before requesting your book.</p>

        <div th:if="${errorMessage}" class="banner banner-error" th:text="${errorMessage}"></div>

        <form th:action="@{/books}" th:object="${bookForm}" method="post" class="stack-form">
            <label>
                Title
                <input type="text" th:field="*{title}" placeholder="Book title">
                <span class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
            </label>

            <label>
                Author
                <input type="text" th:field="*{author}" placeholder="Author name">
                <span class="field-error" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></span>
            </label>

            <label>
                Genre
                <input type="text" th:field="*{genre}" placeholder="Genre">
                <span class="field-error" th:if="${#fields.hasErrors('genre')}" th:errors="*{genre}"></span>
            </label>

            <label>
                Condition
                <input type="text" th:field="*{conditionDescription}" placeholder="Good, Fair, Like New, etc.">
                <span class="field-error" th:if="${#fields.hasErrors('conditionDescription')}" th:errors="*{conditionDescription}"></span>
            </label>

            <label>
                Rental Price
                <input type="number" min="1" step="0.01" th:field="*{rentalPrice}" placeholder="Rental price">
                <span class="field-error" th:if="${#fields.hasErrors('rentalPrice')}" th:errors="*{rentalPrice}"></span>
            </label>

            <div class="date-grid">
                <label>
                    Availability Start
                    <input type="date" th:field="*{availabilityStart}">
                    <span class="field-error" th:if="${#fields.hasErrors('availabilityStart')}" th:errors="*{availabilityStart}"></span>
                </label>

                <label>
                    Availability End
                    <input type="date" th:field="*{availabilityEnd}">
                    <span class="field-error" th:if="${#fields.hasErrors('availabilityEnd')}" th:errors="*{availabilityEnd}"></span>
                </label>
            </div>

            <button type="submit" class="primary-button">Create Listing</button>
        </form>
    </section>
</main>
</body>
</html>
